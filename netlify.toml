[build]
  base = "client/"
  command = "npm run build"
  publish = "dist"

# SPA fallback - all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API calls are proxied to your backend server
[[redirects]]
  from = "/api/*"
  to = "https://travelmate-ai-p9sc.onrender.com/api/:splat"
  status = 200
  force = true

# Socket.IO connections
[[redirects]]
  from = "/socket.io/*"
  to = "https://travelmate-ai-p9sc.onrender.com/socket.io/:splat"
  status = 200
  force = true

# Cache static assets
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"